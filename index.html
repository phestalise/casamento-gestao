<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenypher &amp; Paulo ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --white: #FAFAF8;
  --off-white: #F5F3EE;
  --black: #1A1A1A;
  --dark: #2C2C2C;
  --butter: #E8D882;
  --butter-light: #F4EDB3;
  --butter-deep: #C9B94F;
  --gray: #8A8A8A;
  --gray-light: #D4D4D0;
  --success: #4A7C59;
  --paid-color: #2E6DA4;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Montserrat', sans-serif; background: var(--white); color: var(--black); min-height: 100vh; }

/* ── HERO ── */
.hero {
  position: relative; height: 100vh; min-height: 600px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden; background: #111;
}
.hero-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 40%, #2a2010 100%); z-index: 0;
}
#couple-photo {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center top; opacity: 0.5; z-index: 1;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.72) 100%);
  z-index: 2;
}
.hero-content { position: relative; z-index: 3; text-align: center; padding: 2rem; }
.hero-eyebrow {
  font-size: 0.62rem; font-weight: 600; letter-spacing: 0.4em; text-transform: uppercase;
  color: var(--butter); margin-bottom: 1.5rem; opacity: 0;
  animation: fadeUp 1s ease 0.3s forwards;
}
.hero-names {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3.5rem, 10vw, 7rem); font-weight: 300;
  color: var(--white); line-height: 1.05; opacity: 0;
  animation: fadeUp 1s ease 0.6s forwards;
}
.hero-names em { font-style: italic; color: var(--butter-light); }
.hero-ampersand {
  display: block; font-size: 0.45em; color: var(--butter);
  font-style: normal; letter-spacing: 0.5em; margin: 0.2em 0;
}
.hero-date {
  margin-top: 2rem; font-size: 0.75rem; letter-spacing: 0.3em;
  color: var(--gray-light); font-weight: 300; opacity: 0;
  animation: fadeUp 1s ease 0.9s forwards;
}
.hero-ornament {
  display: flex; align-items: center; gap: 1rem; margin: 1.5rem auto 0;
  opacity: 0; animation: fadeUp 1s ease 1.1s forwards; width: fit-content;
}
.hero-ornament span { display: block; width: 60px; height: 1px; background: var(--butter); }
.hero-ornament .diamond { width: 6px; height: 6px; background: var(--butter); transform: rotate(45deg); flex-shrink: 0; }

.scroll-hint {
  position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  opacity: 0; animation: fadeIn 1s ease 2s forwards;
}
.scroll-hint span { font-size: 0.55rem; letter-spacing: 0.3em; color: var(--gray-light); text-transform: uppercase; }
.scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--butter), transparent); animation: scrollPulse 2s ease-in-out infinite; }

/* ── MAIN ── */
.main-wrap { max-width: 1200px; margin: 0 auto; padding: 5rem 2rem; }

/* ── FINANCEIRO ── */
.finance-summary {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1px; background: var(--gray-light); border: 1px solid var(--gray-light);
  margin-bottom: 2rem;
}
.fin-card { background: var(--white); padding: 1.5rem 2rem; text-align: center; }
.fin-card .label { font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gray); margin-bottom: 0.6rem; }
.fin-card .value { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 600; }
.fin-card .value.total-geral { color: var(--butter-deep); }
.fin-card .value.total-pago { color: var(--paid-color); }
.fin-card .value.total-falta { color: #C0392B; }
.fin-card .value.total-confirmado { color: var(--success); }

/* ── PROGRESS ── */
.progress-wrap { margin-bottom: 3rem; }
.progress-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
.progress-label-row span { font-size: 0.62rem; letter-spacing: 0.15em; color: var(--gray); text-transform: uppercase; }
.progress-bar-bg { height: 6px; background: var(--gray-light); border-radius: 3px; overflow: hidden; position: relative; }
.progress-bar-pago { height: 100%; background: var(--paid-color); border-radius: 3px; transition: width 0.8s ease; }
.progress-bar-ok { height: 100%; background: var(--success); border-radius: 3px; transition: width 0.8s ease; position: absolute; top: 0; left: 0; }

/* ── LEGEND ── */
.legend {
  display: flex; gap: 1.25rem; flex-wrap: wrap; margin-bottom: 2.5rem;
  padding: 1rem 1.25rem; border: 1px solid var(--gray-light); background: var(--off-white);
}
.legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.6rem; letter-spacing: 0.08em; color: var(--gray); }
.legend-dot { width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0; }
.l-ok      { background: #E8F3EC; border: 1px solid #B8D9C4; }
.l-pago    { background: #E3EEF8; border: 1px solid #90B8D8; }
.l-pendente{ background: #FDF8E3; border: 1px solid var(--butter); }
.l-validar { background: #FEF3E2; border: 1px solid #F0C070; }

/* ── SECTION ── */
.section { margin-bottom: 4rem; }
.section-header {
  display: flex; align-items: center; gap: 1.25rem; margin-bottom: 1.5rem;
  padding-bottom: 1rem; border-bottom: 2px solid var(--butter-light);
}
.section-icon {
  width: 36px; height: 36px; border: 1px solid var(--butter-deep);
  display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0;
}
.section-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 400; }
.section-totals { margin-left: auto; text-align: right; }
.section-totals .st-total { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--gray); }
.section-totals .st-pago  { font-size: 0.65rem; color: var(--paid-color); letter-spacing: 0.1em; margin-top: 0.2rem; }

/* ── ITEMS ── */
.items-grid { border: 1px solid var(--gray-light); }
.item-row {
  display: grid; grid-template-columns: 1fr 110px 110px 90px 32px;
  gap: 0.75rem; align-items: center; padding: 0.9rem 1.1rem;
  border-bottom: 1px solid var(--off-white); transition: background 0.2s; cursor: pointer;
}
.item-row:last-child { border-bottom: none; }
.item-row:hover { background: var(--off-white); }
.item-name  { font-size: 0.83rem; font-weight: 500; color: var(--dark); }
.item-value { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; font-weight: 600; color: var(--black); white-space: nowrap; }
.item-paid  { font-family: 'Cormorant Garamond', serif; font-size: 0.9rem; color: var(--paid-color); white-space: nowrap; }
.item-paid.zero { color: var(--gray-light); }
.status-badge {
  font-size: 0.53rem; font-weight: 600; letter-spacing: 0.13em; text-transform: uppercase;
  padding: 0.22rem 0.55rem; border-radius: 1px; white-space: nowrap; text-align: center;
}
.status-ok      { background: #E8F3EC; color: var(--success);    border: 1px solid #B8D9C4; }
.status-pago    { background: #E3EEF8; color: var(--paid-color); border: 1px solid #90B8D8; }
.status-pendente{ background: #FDF8E3; color: #8A6A2A;           border: 1px solid var(--butter); }
.status-validar { background: #FEF3E2; color: #9A6020;           border: 1px solid #F0C070; }
.edit-btn {
  background: none; border: 1px solid var(--gray-light); color: var(--gray);
  width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 0.75rem; transition: all 0.2s; border-radius: 1px; flex-shrink: 0;
}
.edit-btn:hover { border-color: var(--butter-deep); color: var(--butter-deep); }

/* ── GRID HEADER ── */
.items-header {
  display: grid; grid-template-columns: 1fr 110px 110px 90px 32px;
  gap: 0.75rem; padding: 0.5rem 1.1rem;
  background: var(--off-white); border-bottom: 1px solid var(--gray-light);
}
.items-header span { font-size: 0.53rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray); font-weight: 600; }

/* ── ADD BTN ── */
.add-btn {
  width: 100%; padding: 0.8rem; border: 1px dashed var(--gray-light);
  background: none; color: var(--gray); font-size: 0.62rem; letter-spacing: 0.2em;
  text-transform: uppercase; cursor: pointer; font-family: 'Montserrat', sans-serif;
  transition: all 0.2s; margin-top: 0.5rem;
}
.add-btn:hover { border-color: var(--butter-deep); color: var(--butter-deep); background: #FEFBF0; }

/* ── ORNAMENT ── */
.ornament-divider { display: flex; align-items: center; gap: 1rem; margin: 2.5rem 0; }
.ornament-divider .line { flex: 1; height: 1px; background: var(--gray-light); }
.ornament-divider .dot { width: 4px; height: 4px; background: var(--butter-deep); transform: rotate(45deg); }
.ornament-divider .dot.soft { background: var(--gray-light); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px);
}
.modal-overlay.active { opacity: 1; pointer-events: all; }
.modal {
  background: var(--white); width: 90%; max-width: 520px; padding: 2.5rem;
  position: relative; transform: translateY(20px); transition: transform 0.3s;
}
.modal-overlay.active .modal { transform: translateY(0); }
.modal h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; margin-bottom: 1.5rem; font-weight: 400; }
.modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--gray); }
.form-group { margin-bottom: 1.1rem; }
.form-group label { display: block; font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray); margin-bottom: 0.4rem; }
.form-group input, .form-group select {
  width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--gray-light);
  background: var(--off-white); font-family: 'Montserrat', sans-serif;
  font-size: 0.85rem; color: var(--black); outline: none; transition: border-color 0.2s; border-radius: 1px;
}
.form-group input:focus, .form-group select:focus { border-color: var(--butter-deep); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.modal-actions { display: flex; gap: 0.75rem; margin-top: 1.75rem; }
.btn-primary {
  flex: 1; padding: 0.85rem; background: var(--black); color: var(--white);
  border: none; font-family: 'Montserrat', sans-serif; font-size: 0.62rem;
  letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.2s;
}
.btn-primary:hover { background: var(--dark); }
.btn-danger {
  padding: 0.85rem 1.1rem; background: none; color: #C0392B; border: 1px solid #C0392B;
  font-family: 'Montserrat', sans-serif; font-size: 0.62rem; letter-spacing: 0.2em;
  text-transform: uppercase; cursor: pointer; transition: all 0.2s;
}
.btn-danger:hover { background: #C0392B; color: white; }

/* ── TOAST ── */
.save-toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--black); color: var(--butter-light);
  padding: 0.7rem 1.5rem; font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
  border-radius: 2px; transition: transform 0.4s ease; z-index: 2000; pointer-events: none;
}
.save-toast.show { transform: translateX(-50%) translateY(0); }

/* ── FOOTER ── */
footer { background: var(--black); color: var(--gray); text-align: center; padding: 3rem; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; }
footer .heart { color: var(--butter); font-size: 1.2rem; display: block; margin-bottom: 0.75rem; }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .item-row         { grid-template-columns: 1fr 90px 70px 32px; }
  .item-row .item-paid { display: none; }
  .items-header     { grid-template-columns: 1fr 90px 70px 32px; }
  .items-header .h-pago { display: none; }
}

/* ── ANIMATIONS ── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 0.8; } }
@keyframes scrollPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <!-- Foto: coloque o arquivo na mesma pasta e ajuste o nome abaixo (ex: foto.jpg, casal.png) -->
  <img id="couple-photo" src="./foto.JPG" alt="Jenypher e Paulo" onerror="this.style.display='none'">
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <p class="hero-eyebrow">Planejamento do Casamento</p>
    <h1 class="hero-names">
      <em>Jenypher</em>
      <span class="hero-ampersand">&amp;</span>
      <em>Paulo</em>
    </h1>
    <p class="hero-date">25 / 04 / 2026</p>
    <div class="hero-ornament">
      <span></span><div class="diamond"></div><span></span>
    </div>
  </div>

  <div class="scroll-hint">
    <span>Ver planos</span>
    <div class="scroll-line"></div>
  </div>
</section>

<!-- MAIN -->
<main class="main-wrap">

  <div class="finance-summary" id="finance-summary"></div>

  <div class="progress-wrap">
    <div class="progress-label-row">
      <span>Valor já pago</span>
      <span id="progress-pago-pct"></span>
    </div>
    <div class="progress-bar-bg" style="margin-bottom:0.6rem">
      <div class="progress-bar-pago" id="bar-pago"></div>
    </div>
    <div class="progress-label-row" style="margin-top:0.75rem">
      <span>Itens confirmados</span>
      <span id="progress-ok-pct"></span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-ok" id="bar-ok"></div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot l-ok"></div> Confirmado (contratado)</div>
    <div class="legend-item"><div class="legend-dot l-pago"></div> Pago</div>
    <div class="legend-item"><div class="legend-dot l-pendente"></div> Pendente</div>
    <div class="legend-item"><div class="legend-dot l-validar"></div> Validar preço</div>
  </div>

  <div id="sections-wrap"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="hideModal()">✕</button>
    <h3 id="modal-title">Editar item</h3>
    <div class="form-group">
      <label>Nome do item</label>
      <input type="text" id="edit-name" placeholder="Ex: Buffet">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Valor total (R$)</label>
        <input type="number" id="edit-value" min="0" placeholder="0">
      </div>
      <div class="form-group">
        <label>Valor já pago (R$)</label>
        <input type="number" id="edit-paid" min="0" placeholder="0">
      </div>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="edit-status">
        <option value="OK">✅ Confirmado (contratado)</option>
        <option value="PAGO">💳 Pago</option>
        <option value="PENDENTE">⏳ Pendente</option>
        <option value="VALIDAR">⚠️ Validar preço</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveEdit()">Salvar</button>
      <button class="btn-danger" onclick="deleteItem()">Excluir</button>
    </div>
  </div>
</div>

<div class="save-toast" id="save-toast">✓ Salvo automaticamente</div>

<footer>
  <span class="heart">♡</span>
  Jenypher &amp; Paulo · 25 de Abril de 2026
</footer>

<script>
// ── DADOS PADRÃO ──────────────────────────────
const DEFAULT_DATA = {
  casamento: {
    label: 'Lista do Casamento', icon: '💍',
    items: [
      { name: 'Wellucci',            value: 74000, paid: 0, status: 'OK' },
      { name: 'Buffet',              value: 45000, paid: 0, status: 'OK' },
      { name: 'Filmmaker',           value:  6200, paid: 0, status: 'OK' },
      { name: 'Celebrante',          value:  3000, paid: 0, status: 'VALIDAR' },
      { name: 'Assessora',           value:  4800, paid: 0, status: 'VALIDAR' },
      { name: 'Banda pra tocar',     value:  4620, paid: 0, status: 'OK' },
      { name: 'Cabine de foto',      value:  3100, paid: 0, status: 'VALIDAR' },
      { name: 'MilShake',            value: 12000, paid: 0, status: 'VALIDAR' },
      { name: 'Papelaria',           value:  2000, paid: 0, status: 'VALIDAR' },
      { name: 'Caixas de padrinhos', value:  4000, paid: 0, status: 'VALIDAR' },
      { name: 'Lembrancinha',        value:  1800, paid: 0, status: 'VALIDAR' },
    ]
  },
  roupas: {
    label: 'Roupa do Casamento', icon: '👗',
    items: [
      { name: 'Vestido',           value: 8000, paid: 0, status: 'PENDENTE' },
      { name: 'Terno',             value: 2500, paid: 0, status: 'PENDENTE' },
      { name: 'Sandália da Noiva', value: 1000, paid: 0, status: 'PENDENTE' },
      { name: 'Sapato do Noivo',   value:  220, paid: 0, status: 'PENDENTE' },
      { name: 'Dia da Noiva',      value: 5500, paid: 0, status: 'PENDENTE' },
    ]
  },
  pre: {
    label: 'Pré-Wedding', icon: '📸',
    items: [
      { name: 'Vestido da Noiva', value: 1000, paid: 0, status: 'PENDENTE' },
      { name: 'Terno',            value:  500, paid: 0, status: 'PENDENTE' },
      { name: 'Espaço / Locação', value: 3000, paid: 0, status: 'PENDENTE' },
    ]
  }
};

// ── ESTADO ───────────────────────────────────
let data = JSON.parse(JSON.stringify(DEFAULT_DATA));
let editTarget = null;

// ── STORAGE ──────────────────────────────────
function save() {
  try {
    localStorage.setItem('jenypher_paulo_data', JSON.stringify(data));
    showToast();
  } catch(e) { console.warn('localStorage indisponível', e); }
}
function load() {
  try {
    const d = localStorage.getItem('jenypher_paulo_data');
    if (d) {
      data = JSON.parse(d);
      // garante campo paid em itens antigos
      Object.values(data).forEach(s => s.items.forEach(i => { if (i.paid == null) i.paid = 0; }));
    }
  } catch(e) { console.warn('Erro ao carregar', e); }
}
function showToast() {
  const t = document.getElementById('save-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── FORMAT / STATUS ───────────────────────────
const fmt = v => 'R$ ' + Number(v||0).toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
function statusClass(s) {
  if (s==='OK')       return 'status-ok';
  if (s==='PAGO')     return 'status-pago';
  if (s==='PENDENTE') return 'status-pendente';
  return 'status-validar';
}
function statusLabel(s) {
  if (s==='OK')       return '✓ Confirmado';
  if (s==='PAGO')     return '💳 Pago';
  if (s==='PENDENTE') return '⏳ Pendente';
  return '⚠ Validar';
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── RENDER ───────────────────────────────────
function render() { renderFinance(); renderProgress(); renderSections(); }

function allItems() { return Object.values(data).flatMap(s => s.items); }

function renderFinance() {
  const all   = allItems();
  const grand = all.reduce((a,i) => a+(i.value||0), 0);
  const pago  = all.reduce((a,i) => a+(i.paid||0),  0);
  const falta = grand - pago;
  const conf  = all.filter(i => i.status==='OK'||i.status==='PAGO').reduce((a,i) => a+(i.value||0), 0);
  document.getElementById('finance-summary').innerHTML = `
    <div class="fin-card"><p class="label">Total do Casamento</p><p class="value total-geral">${fmt(grand)}</p></div>
    <div class="fin-card"><p class="label">Já Pago</p><p class="value total-pago">${fmt(pago)}</p></div>
    <div class="fin-card"><p class="label">Falta Pagar</p><p class="value total-falta">${fmt(falta)}</p></div>
    <div class="fin-card"><p class="label">Confirmados / Contratados</p><p class="value total-confirmado">${fmt(conf)}</p></div>
  `;
}

function renderProgress() {
  const all   = allItems();
  const grand = all.reduce((a,i) => a+(i.value||0), 0) || 1;
  const pago  = all.reduce((a,i) => a+(i.paid||0),  0);
  const ok    = all.filter(i => i.status==='OK'||i.status==='PAGO').length;
  const pagoPct = Math.min(100, Math.round(pago/grand*100));
  const okPct   = Math.round(ok/all.length*100);
  document.getElementById('bar-pago').style.width = pagoPct + '%';
  document.getElementById('bar-ok').style.width   = okPct   + '%';
  document.getElementById('progress-pago-pct').textContent = fmt(pago) + ' de ' + fmt(grand) + ' (' + pagoPct + '%)';
  document.getElementById('progress-ok-pct').textContent   = ok + ' / ' + all.length + ' itens (' + okPct + '%)';
}

function renderSections() {
  const wrap = document.getElementById('sections-wrap');
  wrap.innerHTML = '';
  Object.entries(data).forEach(([key, section]) => {
    const total = section.items.reduce((a,i) => a+(i.value||0), 0);
    const pago  = section.items.reduce((a,i) => a+(i.paid||0),  0);
    const itemsHtml = section.items.map((item, idx) => `
      <div class="item-row" onclick="openEdit('${key}',${idx})">
        <span class="item-name">${escHtml(item.name)}</span>
        <span class="item-value">${fmt(item.value)}</span>
        <span class="item-paid ${(item.paid||0)===0?'zero':''}">${(item.paid||0)>0 ? fmt(item.paid) : '—'}</span>
        <span class="status-badge ${statusClass(item.status)}">${statusLabel(item.status)}</span>
        <button class="edit-btn" onclick="openEdit('${key}',${idx});event.stopPropagation()">✎</button>
      </div>
    `).join('');
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `
      <div class="section-header">
        <div class="section-icon">${section.icon}</div>
        <h2>${section.label}</h2>
        <div class="section-totals">
          <div class="st-total">${fmt(total)}</div>
          ${pago>0 ? `<div class="st-pago">💳 ${fmt(pago)} pago</div>` : ''}
        </div>
      </div>
      <div class="items-header">
        <span>Item</span><span>Valor total</span><span class="h-pago">Pago</span><span>Status</span><span></span>
      </div>
      <div class="items-grid">${itemsHtml}</div>
      <button class="add-btn" onclick="openAdd('${key}')">+ Adicionar item</button>
      <div class="ornament-divider">
        <div class="line"></div>
        <div class="dot"></div><div class="dot soft"></div><div class="dot"></div>
        <div class="line"></div>
      </div>
    `;
    wrap.appendChild(div);
  });
}

// ── MODAL ────────────────────────────────────
function openEdit(sectionKey, idx) {
  const item = data[sectionKey].items[idx];
  editTarget = { sectionKey, idx, isNew: false };
  document.getElementById('modal-title').textContent = 'Editar: ' + item.name;
  document.getElementById('edit-name').value   = item.name;
  document.getElementById('edit-value').value  = item.value || 0;
  document.getElementById('edit-paid').value   = item.paid  || 0;
  document.getElementById('edit-status').value = item.status;
  showModal();
}
function openAdd(sectionKey) {
  editTarget = { sectionKey, idx: null, isNew: true };
  document.getElementById('modal-title').textContent = 'Novo item — ' + data[sectionKey].label;
  document.getElementById('edit-name').value   = '';
  document.getElementById('edit-value').value  = '';
  document.getElementById('edit-paid').value   = '0';
  document.getElementById('edit-status').value = 'PENDENTE';
  showModal();
}
function showModal()      { document.getElementById('modal').classList.add('active'); }
function hideModal()      { document.getElementById('modal').classList.remove('active'); }
function closeModalClick(e){ if (e.target===document.getElementById('modal')) hideModal(); }

function saveEdit() {
  const name  = document.getElementById('edit-name').value.trim();
  const value = parseFloat(document.getElementById('edit-value').value) || 0;
  const paid  = Math.min(parseFloat(document.getElementById('edit-paid').value) || 0, value);
  const status= document.getElementById('edit-status').value;
  if (!name) return;
  const item = { name, value, paid, status };
  if (editTarget.isNew) {
    data[editTarget.sectionKey].items.push(item);
  } else {
    data[editTarget.sectionKey].items[editTarget.idx] = item;
  }
  hideModal(); save(); render();
}
function deleteItem() {
  if (editTarget.isNew) { hideModal(); return; }
  if (!confirm('Remover "' + data[editTarget.sectionKey].items[editTarget.idx].name + '"?')) return;
  data[editTarget.sectionKey].items.splice(editTarget.idx, 1);
  hideModal(); save(); render();
}

// ── INIT ─────────────────────────────────────
load();
render();
</script>
</body>
